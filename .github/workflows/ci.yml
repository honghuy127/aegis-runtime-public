name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyflakes

      - name: Undefined-name lint (pyflakes)
        run: |
          python -m pyflakes core/scenario_runner.py core/route_binding.py main.py

      - name: Run tests
        run: python -m pytest
