[pytest]
testpaths = tests
python_files = test_*.py
norecursedirs = tests/manual
markers =
    unit: Fast unit tests with no I/O (default, runs on every commit)
    integration: Tests that touch filesystem/DB (runs on PR, uses temp files)
    e2e: End-to-end tests requiring browser/network (manual/nightly only)
    slow: Tests taking >1s execution time (runs on PR, not on commit)
    llm: tests that call real LLM models
    vlm: tests that call real VLM models
    heavy: slow or model-dependent tests
    manual: tests intended for explicit invocation only
    timeout: Per-test timeout (pytest-timeout)
filterwarnings =
    ignore:The 'strip_cdata' option of HTMLParser\(\) has never done anything and will eventually be removed\.:DeprecationWarning:bs4\.builder\._lxml
