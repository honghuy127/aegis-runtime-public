# Knowledge Base Index

# This file provides a machine-readable index of authoritative documentation topics.
# Agents should use this to discover relevant docs based on task context.

version: "1.0"
last_updated: "2026-02-26"

# Navigation Guide
#
# For AI agents:
#   1. Read INDEX.md for reading order
#   2. Query entrypoints for core docs
#   3. Use symptom_index for troubleshooting
#   4. Search tags for semantic discovery
#
# For developers:
#   1. Start with kb/INDEX.md or docs/README.md
#   2. Read doctrine → architecture → runtime_contracts
#   3. Use symptom_index to debug issues

# YAML Catalog Access Guide
#
# YAML catalogs in this KB are authoritative data sources but must be
# accessed SELECTIVELY through utils/kb_yaml_retriever.py, not by loading
# entire files into agent context.
#
# DO NOT:   yaml.safe_load(open('evidence_fields.yaml'))  [bloats context]
# DO USE:   from utils import kb_yaml_retriever
#           kb_yaml_retriever.get_evidence_field('calendar.opened')  [bounded]
#
# Guarded catalogs (selective loading enforced):
#
# Evidence System:
#   - kb/10_runtime_contracts/evidence_fields.yaml (659 lines)
#     Use: get_evidence_field(), get_reason_evidence_mapping()
#     Primary registry for evidence field definitions
#
#   - kb/10_runtime_contracts/evidence_catalog.yaml (824 lines)
#     Comprehensive evidence catalog (includes examples, validation)
#
#   - kb/10_runtime_contracts/evidence_schema.yaml (39 lines)
#     Schema definition for evidence structure
#
#   - kb/10_runtime_contracts/evidence_artifacts.yaml (41 lines)
#     Artifact type specifications
#
# Triage & Diagnosis:
#   - kb/20_decision_system/triage_decision_table.yaml (335 lines)
#     Use: get_triage_decision(), list_triage_reasons()
#     Reason code → evidence → first fix mappings
#
#   - kb/20_decision_system/runtime_symptom_map.yaml (217 lines)
#     Use: get_symptom_diagnosis(), list_symptoms()
#     Symptom → diagnosis → KB refs
#
# Architecture Invariants:
#   - kb/00_foundation/invariants_registry.yaml (492 lines)
#     Use: get_invariant(), list_invariants()
#     Primary invariants registry with test linkage
#
#   - kb/00_foundation/architecture_invariants.yaml (593 lines)
#     Extended invariants with detailed specifications
#
#   - kb/00_foundation/invariants_by_category.yaml (85 lines)
#     Category-based invariant index
#
# See docs/kb/50_governance/kb_structured_retrieval.md for complete API reference.

